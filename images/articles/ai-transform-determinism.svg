<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="blueGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0668E1"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="url(#bgGrad)" rx="16"/>
  <rect x="1" y="1" width="898" height="478" rx="16" fill="none" stroke="url(#blueGreen)" stroke-width="1" opacity="0.3"/>

  <text x="450" y="45" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="url(#blueGreen)">The Real Divider: Determinism vs. Ambiguity</text>
  <text x="450" y="70" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#666">It's not about coding language or prompting ability — it's about problem structure</text>

  <!-- 2x4 Grid comparison -->
  <!-- Headers -->
  <rect x="50" y="95" width="390" height="45" rx="12" fill="rgba(0,212,170,0.15)" stroke="#00D4AA" stroke-width="1.5"/>
  <text x="245" y="124" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#00D4AA">AI Performs Best When</text>

  <rect x="460" y="95" width="390" height="45" rx="12" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="655" y="124" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#ef4444">AI Performs Poorly When</text>

  <!-- Row 1 -->
  <rect x="50" y="155" width="390" height="55" rx="10" fill="#111111" stroke="rgba(0,212,170,0.2)" stroke-width="1"/>
  <circle cx="85" cy="182" r="15" fill="rgba(0,212,170,0.2)"/>
  <text x="85" y="187" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#00D4AA">&#x2713;</text>
  <text x="110" y="178" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Solution space is well-defined</text>
  <text x="110" y="196" font-family="Inter,sans-serif" font-size="11" fill="#666">Clear inputs, expected outputs, known patterns</text>

  <rect x="460" y="155" width="390" height="55" rx="10" fill="#111111" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <circle cx="495" cy="182" r="15" fill="rgba(239,68,68,0.2)"/>
  <text x="495" y="187" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#ef4444">&#x2717;</text>
  <text x="520" y="178" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Problem is ambiguous</text>
  <text x="520" y="196" font-family="Inter,sans-serif" font-size="11" fill="#666">Unclear requirements, evolving context</text>

  <!-- Row 2 -->
  <rect x="50" y="220" width="390" height="55" rx="10" fill="#111111" stroke="rgba(0,212,170,0.2)" stroke-width="1"/>
  <circle cx="85" cy="247" r="15" fill="rgba(0,212,170,0.2)"/>
  <text x="85" y="252" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#00D4AA">&#x2713;</text>
  <text x="110" y="243" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Outputs are predictable</text>
  <text x="110" y="261" font-family="Inter,sans-serif" font-size="11" fill="#666">Known output formats, deterministic transforms</text>

  <rect x="460" y="220" width="390" height="55" rx="10" fill="#111111" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <circle cx="495" cy="247" r="15" fill="rgba(239,68,68,0.2)"/>
  <text x="495" y="252" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#ef4444">&#x2717;</text>
  <text x="520" y="243" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Consequences are high</text>
  <text x="520" y="261" font-family="Inter,sans-serif" font-size="11" fill="#666">Financial, security, or operational impact</text>

  <!-- Row 3 -->
  <rect x="50" y="285" width="390" height="55" rx="10" fill="#111111" stroke="rgba(0,212,170,0.2)" stroke-width="1"/>
  <circle cx="85" cy="312" r="15" fill="rgba(0,212,170,0.2)"/>
  <text x="85" y="317" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#00D4AA">&#x2713;</text>
  <text x="110" y="308" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Validation is fast</text>
  <text x="110" y="326" font-family="Inter,sans-serif" font-size="11" fill="#666">Quick tests, visual checks, instant feedback</text>

  <rect x="460" y="285" width="390" height="55" rx="10" fill="#111111" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <circle cx="495" cy="312" r="15" fill="rgba(239,68,68,0.2)"/>
  <text x="495" y="317" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#ef4444">&#x2717;</text>
  <text x="520" y="308" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Systems are interdependent</text>
  <text x="520" y="326" font-family="Inter,sans-serif" font-size="11" fill="#666">Changes ripple across services and teams</text>

  <!-- Row 4 -->
  <rect x="50" y="350" width="390" height="55" rx="10" fill="#111111" stroke="rgba(0,212,170,0.2)" stroke-width="1"/>
  <circle cx="85" cy="377" r="15" fill="rgba(0,212,170,0.2)"/>
  <text x="85" y="382" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#00D4AA">&#x2713;</text>
  <text x="110" y="373" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Errors are cheap</text>
  <text x="110" y="391" font-family="Inter,sans-serif" font-size="11" fill="#666">Easy to revert, low blast radius</text>

  <rect x="460" y="350" width="390" height="55" rx="10" fill="#111111" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <circle cx="495" cy="377" r="15" fill="rgba(239,68,68,0.2)"/>
  <text x="495" y="382" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#ef4444">&#x2717;</text>
  <text x="520" y="373" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Correctness is non-trivial</text>
  <text x="520" y="391" font-family="Inter,sans-serif" font-size="11" fill="#666">Edge cases, race conditions, data integrity</text>

  <!-- Bottom insight -->
  <rect x="200" y="425" width="500" height="42" rx="12" fill="rgba(6,104,225,0.1)" stroke="rgba(6,104,225,0.3)" stroke-width="1"/>
  <text x="450" y="451" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#0668E1">This should reframe how we think about "AI productivity gains"</text>
</svg>
