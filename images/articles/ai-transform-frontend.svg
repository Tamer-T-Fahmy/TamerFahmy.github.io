<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="blueGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0668E1"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#0668E1"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="url(#bgGrad)" rx="16"/>
  <rect x="1" y="1" width="898" height="478" rx="16" fill="none" stroke="url(#blueGreen)" stroke-width="1" opacity="0.3"/>

  <text x="450" y="45" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="url(#blueGreen)">Why Frontend Engineering Sees the Biggest AI Productivity Uplift</text>
  <text x="450" y="70" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#666">AI is fundamentally a speed amplifier — frontend is fundamentally a speed problem</text>

  <!-- Three pillars -->
  <!-- Pillar 1: Standardization -->
  <rect x="40" y="95" width="260" height="320" rx="14" fill="#111111" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="40" y="95" width="260" height="50" rx="14" fill="rgba(0,212,170,0.1)"/>
  <rect x="40" y="131" width="260" height="14" fill="#111111"/>
  <text x="170" y="127" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#00D4AA">High Standardization</text>

  <rect x="60" y="160" width="220" height="40" rx="8" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="170" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Component-based architectures</text>

  <rect x="60" y="210" width="220" height="40" rx="8" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="170" y="235" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Design systems (Material UI, tokens)</text>

  <rect x="60" y="260" width="220" height="40" rx="8" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="170" y="285" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Well-defined UI conventions</text>

  <!-- Meter -->
  <text x="170" y="330" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#666">AI Reliability</text>
  <rect x="70" y="340" width="200" height="10" rx="5" fill="#1a1a1a"/>
  <rect x="70" y="340" width="180" height="10" rx="5" fill="#00D4AA"/>
  <text x="260" y="350" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#00D4AA">90%</text>

  <!-- Pillar 2: Fast Feedback -->
  <rect x="320" y="95" width="260" height="320" rx="14" fill="#111111" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="320" y="95" width="260" height="50" rx="14" fill="rgba(6,104,225,0.1)"/>
  <rect x="320" y="131" width="260" height="14" fill="#111111"/>
  <text x="450" y="127" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#0668E1">Fast Feedback Loops</text>

  <!-- Cycle diagram -->
  <circle cx="450" cy="220" r="60" fill="none" stroke="rgba(6,104,225,0.3)" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="415" y="170" width="70" height="28" rx="6" fill="rgba(6,104,225,0.2)" stroke="#0668E1" stroke-width="1"/>
  <text x="450" y="189" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0668E1">Code</text>
  <rect x="490" y="210" width="70" height="28" rx="6" fill="rgba(6,104,225,0.2)" stroke="#0668E1" stroke-width="1"/>
  <text x="525" y="229" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0668E1">See UI</text>
  <rect x="415" y="245" width="70" height="28" rx="6" fill="rgba(6,104,225,0.2)" stroke="#0668E1" stroke-width="1"/>
  <text x="450" y="264" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0668E1">Adjust</text>
  <rect x="380" y="210" width="70" height="28" rx="6" fill="rgba(6,104,225,0.2)" stroke="#0668E1" stroke-width="1"/>
  <text x="415" y="229" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0668E1">Validate</text>

  <text x="450" y="310" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Immediate visual feedback</text>
  <text x="450" y="328" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Short cycle time</text>

  <!-- Meter -->
  <text x="450" y="355" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#666">Iteration Speed</text>
  <rect x="350" y="365" width="200" height="10" rx="5" fill="#1a1a1a"/>
  <rect x="350" y="365" width="190" height="10" rx="5" fill="#0668E1"/>
  <text x="545" y="375" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0668E1">95%</text>

  <!-- Pillar 3: Pattern Repetition -->
  <rect x="600" y="95" width="260" height="320" rx="14" fill="#111111" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="600" y="95" width="260" height="50" rx="14" fill="rgba(139,92,246,0.1)"/>
  <rect x="600" y="131" width="260" height="14" fill="#111111"/>
  <text x="730" y="127" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#8b5cf6">Strong Pattern Repetition</text>

  <rect x="620" y="160" width="220" height="40" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="730" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Forms &amp; input components</text>

  <rect x="620" y="210" width="220" height="40" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="730" y="235" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Tables &amp; data displays</text>

  <rect x="620" y="260" width="220" height="40" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="730" y="285" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Layout scaffolding</text>

  <rect x="620" y="310" width="220" height="40" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="730" y="335" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Boilerplate code</text>

  <!-- Meter -->
  <text x="730" y="370" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#666">Automation Potential</text>
  <rect x="630" y="380" width="200" height="10" rx="5" fill="#1a1a1a"/>
  <rect x="630" y="380" width="170" height="10" rx="5" fill="#8b5cf6"/>
  <text x="810" y="390" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">85%</text>

  <!-- Bottom summary -->
  <rect x="150" y="435" width="600" height="35" rx="10" fill="rgba(0,212,170,0.1)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="450" y="458" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#00D4AA">Frontend = Highest AI Productivity Uplift Across All Engineering Domains</text>
</svg>
