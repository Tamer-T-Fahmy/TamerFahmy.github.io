<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="blueGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0668E1"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bgGrad)" rx="16"/>
  <rect x="1" y="1" width="898" height="498" rx="16" fill="none" stroke="url(#blueGreen)" stroke-width="1" opacity="0.3"/>

  <text x="450" y="45" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="url(#blueGreen)">Infrastructure &amp; SRE: Lowest Direct AI Impact (For Now)</text>

  <!-- Domains with limited AI impact -->
  <text x="450" y="80" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#666">Domains requiring deep judgment, multi-layer reasoning, and high-consequence decisions</text>

  <!-- Domain cards in a row -->
  <rect x="30" y="100" width="160" height="80" rx="10" fill="#111111" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="110" y="135" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Distributed</text>
  <text x="110" y="153" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">System Design</text>

  <rect x="200" y="100" width="160" height="80" rx="10" fill="#111111" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="280" y="135" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Cloud</text>
  <text x="280" y="153" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Architecture</text>

  <rect x="370" y="100" width="160" height="80" rx="10" fill="#111111" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="450" y="135" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Reliability</text>
  <text x="450" y="153" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Engineering (SRE)</text>

  <rect x="540" y="100" width="160" height="80" rx="10" fill="#111111" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="620" y="135" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Performance/Cost</text>
  <text x="620" y="153" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Trade-offs</text>

  <rect x="710" y="100" width="160" height="80" rx="10" fill="#111111" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="790" y="135" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Incident</text>
  <text x="790" y="153" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Response</text>

  <!-- Why AI is limited - 3 reasons -->
  <text x="450" y="215" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#ef4444">Why AI Impact Is Limited Here</text>

  <!-- Reason 1 -->
  <rect x="50" y="235" width="250" height="120" rx="12" fill="#111111" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <circle cx="90" cy="265" r="18" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="90" y="271" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#ef4444">1</text>
  <text x="120" y="270" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#ffffff">High Consequence</text>
  <text x="70" y="300" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">System-wide implications:</text>
  <text x="70" y="318" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">downtime, latency, cost...</text>
  <text x="70" y="340" font-family="Inter,sans-serif" font-size="12" fill="#ef4444">Errors are expensive</text>

  <!-- Reason 2 -->
  <rect x="325" y="235" width="250" height="120" rx="12" fill="#111111" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <circle cx="365" cy="265" r="18" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="365" y="271" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#f59e0b">2</text>
  <text x="395" y="270" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Judgment-Heavy</text>
  <text x="345" y="300" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Non-deterministic decisions</text>
  <text x="345" y="318" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">requiring contextual business</text>
  <text x="345" y="336" font-family="Inter,sans-serif" font-size="12" fill="#f59e0b">understanding, not just code</text>

  <!-- Reason 3 -->
  <rect x="600" y="235" width="250" height="120" rx="12" fill="#111111" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <circle cx="640" cy="265" r="18" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="640" y="271" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#8b5cf6">3</text>
  <text x="670" y="270" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Multi-Layer Reasoning</text>
  <text x="620" y="300" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Complex interdependencies</text>
  <text x="620" y="318" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">across systems, networks,</text>
  <text x="620" y="336" font-family="Inter,sans-serif" font-size="12" fill="#8b5cf6">and organizational boundaries</text>

  <!-- Bottom: What AI CAN still do -->
  <rect x="100" y="380" width="700" height="100" rx="14" fill="rgba(0,212,170,0.06)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="450" y="408" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#00D4AA">AI Can Still Assist With</text>

  <text x="190" y="438" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Scripting</text>
  <text x="190" y="455" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">automation</text>
  <text x="340" y="438" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Log</text>
  <text x="340" y="455" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">analysis</text>
  <text x="490" y="438" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Drafting</text>
  <text x="490" y="455" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">configurations</text>
  <text x="640" y="438" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Suggesting</text>
  <text x="640" y="455" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">patterns</text>

  <!-- Separator dots -->
  <circle cx="265" cy="445" r="3" fill="#00D4AA" opacity="0.5"/>
  <circle cx="415" cy="445" r="3" fill="#00D4AA" opacity="0.5"/>
  <circle cx="565" cy="445" r="3" fill="#00D4AA" opacity="0.5"/>
</svg>
