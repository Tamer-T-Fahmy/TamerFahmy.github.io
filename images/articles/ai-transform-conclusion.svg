<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="blueGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0668E1"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
  </defs>
  <rect width="900" height="420" fill="url(#bgGrad)" rx="16"/>
  <rect x="1" y="1" width="898" height="418" rx="16" fill="none" stroke="url(#blueGreen)" stroke-width="1" opacity="0.3"/>

  <text x="450" y="45" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="url(#blueGreen)">What This Means for Engineering Organizations</text>

  <!-- Three columns -->
  <!-- Column 1: Dramatic Acceleration -->
  <rect x="40" y="75" width="260" height="260" rx="14" fill="#111111" stroke="#00D4AA" stroke-width="1.5"/>
  <rect x="40" y="75" width="260" height="50" rx="14" fill="rgba(0,212,170,0.12)"/>
  <rect x="40" y="111" width="260" height="14" fill="#111111"/>
  <text x="170" y="106" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#00D4AA">Dramatic Acceleration</text>

  <rect x="60" y="140" width="220" height="35" rx="8" fill="rgba(0,212,170,0.06)"/>
  <text x="170" y="163" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Frontend development</text>

  <rect x="60" y="183" width="220" height="35" rx="8" fill="rgba(0,212,170,0.06)"/>
  <text x="170" y="206" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Prototyping &amp; MVPs</text>

  <rect x="60" y="226" width="220" height="35" rx="8" fill="rgba(0,212,170,0.06)"/>
  <text x="170" y="249" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Tooling &amp; automation</text>

  <rect x="60" y="275" width="220" height="45" rx="8" fill="rgba(0,212,170,0.1)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="170" y="295" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#00D4AA">Speed gains are real</text>
  <text x="170" y="311" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#00D4AA">and measurable today</text>

  <!-- Column 2: The Shift -->
  <rect x="320" y="75" width="260" height="260" rx="14" fill="#111111" stroke="#0668E1" stroke-width="1.5"/>
  <rect x="320" y="75" width="260" height="50" rx="14" fill="rgba(6,104,225,0.12)"/>
  <rect x="320" y="111" width="260" height="14" fill="#111111"/>
  <text x="450" y="106" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#0668E1">The Real Shift</text>

  <!-- From/To arrows -->
  <text x="345" y="155" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#666">FROM</text>
  <text x="345" y="175" font-family="Inter,sans-serif" font-size="13" fill="#a0a0a0">Writing code</text>
  <text x="480" y="167" font-family="Inter,sans-serif" font-size="18" fill="#0668E1">&#x2192;</text>
  <text x="510" y="155" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0668E1">TO</text>
  <text x="510" y="175" font-family="Inter,sans-serif" font-size="13" fill="#ffffff">Reviewing &amp; guiding</text>

  <line x1="340" y1="190" x2="560" y2="190" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <text x="345" y="210" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#666">FROM</text>
  <text x="345" y="230" font-family="Inter,sans-serif" font-size="13" fill="#a0a0a0">Implementation</text>
  <text x="480" y="222" font-family="Inter,sans-serif" font-size="18" fill="#0668E1">&#x2192;</text>
  <text x="510" y="210" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0668E1">TO</text>
  <text x="510" y="230" font-family="Inter,sans-serif" font-size="13" fill="#ffffff">System design</text>

  <line x1="340" y1="245" x2="560" y2="245" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <text x="345" y="265" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#666">FROM</text>
  <text x="345" y="285" font-family="Inter,sans-serif" font-size="13" fill="#a0a0a0">Coding speed</text>
  <text x="480" y="277" font-family="Inter,sans-serif" font-size="18" fill="#0668E1">&#x2192;</text>
  <text x="510" y="265" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0668E1">TO</text>
  <text x="510" y="285" font-family="Inter,sans-serif" font-size="13" fill="#ffffff">Validation &amp; judgment</text>

  <!-- Column 3: Still Human -->
  <rect x="600" y="75" width="260" height="260" rx="14" fill="#111111" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="600" y="75" width="260" height="50" rx="14" fill="rgba(245,158,11,0.12)"/>
  <rect x="600" y="111" width="260" height="14" fill="#111111"/>
  <text x="730" y="106" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#f59e0b">Remains Human-Heavy</text>

  <rect x="620" y="140" width="220" height="35" rx="8" fill="rgba(245,158,11,0.06)"/>
  <text x="730" y="163" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Infrastructure engineering</text>

  <rect x="620" y="183" width="220" height="35" rx="8" fill="rgba(245,158,11,0.06)"/>
  <text x="730" y="206" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Distributed systems</text>

  <rect x="620" y="226" width="220" height="35" rx="8" fill="rgba(245,158,11,0.06)"/>
  <text x="730" y="249" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#a0a0a0">Security architecture</text>

  <rect x="620" y="275" width="220" height="45" rx="8" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="730" y="295" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#f59e0b">Experience and judgment</text>
  <text x="730" y="311" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#f59e0b">remain irreplaceable</text>

  <!-- Bottom key message -->
  <rect x="100" y="360" width="700" height="48" rx="14" fill="rgba(6,104,225,0.1)" stroke="url(#blueGreen)" stroke-width="1.5"/>
  <text x="450" y="389" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#ffffff">The biggest shift is compression of the implementation layer of software engineering</text>
</svg>
